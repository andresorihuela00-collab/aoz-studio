  <section style="padding-top: 64px;">
    <div class="wrap">
      <h1 class="page-header reveal" data-i18n="page.contactTitle">Get in Touch</h1>

      <div class="contact-grid" style="margin-top: 96px;">
        <div class="contact-details reveal">
          <a href="mailto:andresorihuela00@gmail.com">andresorihuela00@gmail.com</a>
          <a href="tel:+61415304736">+61 415 304 736</a>
          <a href="https://instagram.com/aoz_archt" target="_blank" rel="noopener">@aoz_archt (Instagram)</a>
        </div>

        <div class="reveal">
          <!-- Replace YOUR_ID with your real Formspree form ID after signing up at formspree.io -->
          <form id="contact-form" action="https://formspree.io/f/YOUR_ID" method="POST">
            <div class="field">
              <label for="name" data-i18n="contact.formName">Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="field">
              <label for="email" data-i18n="contact.formEmail">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
              <label for="message" data-i18n="contact.formMessage">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn-dark" data-i18n="contact.sendBtn">Send Message</button>
            <p class="form-status"></p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <span>AOZ Studio</span>
