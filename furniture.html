<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furniture &amp; Objects — AOZ Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .furniture-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px 40px;
      margin-top: 80px;
    }
    .furniture-card {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .furniture-card-image {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #EDEBE6;
    }
    .furniture-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .furniture-card:hover .furniture-card-image img {
      transform: scale(1.03);
    }
    .furniture-card-info {
      margin-top: 18px;
    }
    .furniture-card-name {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #1C1C1C;
      margin: 0 0 6px;
    }
    .furniture-card-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1C1C1C;
      opacity: 0.45;
      margin: 0;
    }
    @media (max-width: 900px) {
      .furniture-grid { grid-template-columns: repeat(2, 1fr); gap: 36px 28px; }
    }
    @media (max-width: 560px) {
      .furniture-grid { grid-template-columns: 1fr; gap: 40px; }
    }
  </style>
</head>
